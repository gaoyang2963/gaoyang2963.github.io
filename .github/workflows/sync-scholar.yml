name: Sync Google Scholar Publications

on:
  schedule:
    # Run on the 1st of every month at 00:00 UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-scholar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scholarly requests

      - name: Sync Google Scholar publications
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
        run: |
          # Run the sync script
          python sync_google_scholar.py

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.git-check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Auto: Sync publications from Google Scholar"
          title: "📚 Monthly Google Scholar Sync - Please Review"
          body: |
            ## 📚 Monthly Google Scholar Publications Sync
            
            This PR automatically syncs new publications from Google Scholar.
            
            ### What to review:
            - ✅ Check if the new papers are correct
            - ✅ Verify the DOI links work
            - ✅ Ensure formatting is correct
            - ✅ Confirm no unwanted papers are included
            
            ### How to proceed:
            1. Review the changes in the "Files changed" tab
            2. Test locally if needed: `hugo server -D`
            3. If everything looks good, merge this PR
            4. The website will automatically deploy after merge
            
            ### Important:
            - This PR only affects `content/_index.md`
            - Original file is backed up automatically
            - You can always discard changes if needed
            
            --- 
            *Automated sync from Google Scholar (ID: gMVDb5wAAAAJ)*
          branch: auto-sync-google-scholar
          delete-branch: true
          draft: false
