baseURL: 'https://gao-yang.cc'
languageCode: 'en-us'
title: 'Yang Gao | VIGA Lab'
theme: 'PaperMod'

# Pagination
pagination:
  pagerSize: 10
  path: '/page/'

# Enable emoji
enableEmoji: true

# Enable Git Info
enableGitInfo: false

# Security
security:
  funcs:
    getenv:
      - ^HUGO_
      - ^WC_

# Markup
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    codeFences: true
    guessSyntax: true
    lineNos: false
    noClasses: false
    style: 'dracula'

# Image processing
imaging:
  quality: 75
  resampleFilter: 'lanczos'

# Taxonomies
taxonomies:
  tag: 'tags'
  category: 'categories'

# Permalinks
permalinks:
  tags: '/tag/:slug/'
  categories: '/category/:slug/'

# Outputs
outputs:
  home: ['HTML', 'RSS', 'JSON']
  section: ['HTML', 'RSS']

# Media types
mediaTypes:
  application/manifest+json:
    suffixes: ['webmanifest']

# Sitemap
sitemap:
  changefreq: 'weekly'
  filename: 'sitemap.xml'
  priority: 0.5

# Related content
related:
  threshold: 80
  includeNewer: true
  toLower: true
  indices:
    - name: 'tags'
      weight: 100
    - name: 'categories'
      weight: 70

# Menu configuration is in menus.yaml