# PaperMod Theme Parameters
# Documentation: https://github.com/adityatelange/hugo-PaperMod/wiki/Features

env: production
title: Yang Gao | VIGA Lab
description: "Virtual Intelligence and Graphical Animation Laboratory - Research in VR, fluid simulation, and realistic rendering"
keywords: [VR, Virtual Reality, Fluid Simulation, Computer Graphics, Research]
author: Yang Gao

# Home Page Parameters
profileMode:
  enabled: false

homeInfoParams:
  Title: "VIGA Lab"
  Content: "Virtual Intelligence and Graphical Animation Laboratory - Research in VR, fluid simulation, and realistic rendering"

# Social Icons
socialIcons:
  - name: email
    url: "mailto:honggaoyang@anspxhj999.onexmail.com"
  - name: github
    url: "https://github.com/gaoyang2963"

# Site Settings
defaultTheme: auto
ShowShareButtons: false
ShowReadingTime: false
displayFullLangName: true
ShowPostNavLinks: true
ShowBreadCrumbs: true
ShowCodeCopyButtons: true
ShowRssButtonInSectionTermList: true
ShowToc: true
TocOpen: false

# Comments
comments: false

# Analytics
googleAnalytics: ""
baiduAnalytics: "8b2d274f38f0a4439839a322bf8e9711"

# Assets
assets:
  disableHLJS: false
  favicon: "/favicon.ico"
  favicon16x16: "/favicon-16x16.png"
  favicon32x32: "/favicon-32x32.png"
  apple_touch_icon: "/apple-touch-icon.png"
  safari_pinned_tab: "/safari-pinned-tab.svg"

# Cover Images
cover:
  hidden: true
  hiddenInList: true
  hiddenInSingle: true

# Edit Post
editPost:
  URL: "https://github.com/gaoyang2963/gaoyang2963.github.io/tree/main/content"
  Text: "Suggest Changes"
  appendFilePath: true

# Search
search:
  enable: true

# Fuse.js Search
fuseOpts:
  isCaseSensitive: false
  shouldSort: true
  location: 0
  distance: 1000
  threshold: 0.4
  minMatchCharLength: 0
  keys: ["title", "permalink", "summary", "content"]

# Label
label:
  text: "VIGA Lab"
  icon: /apple-touch-icon.png
  iconHeight: 35

# Custom CSS/JS
customCSS: []
customJS: []